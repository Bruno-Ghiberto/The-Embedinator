- id: Q-015
  category: follow-up
  question_es: "¿Comprende también las reparaciones y modificaciones de instalaciones ya existentes?"
  reference_answer_es: >
    Sí. Según NAG-200 §1.2.2, el Reglamento comprende tanto las instalaciones
    nuevas como las reparaciones o modificaciones de instalaciones domiciliarias
    existentes, incluyendo el agregado, cambio de ubicación, retiro o reemplazo
    de artefactos. Para modificaciones sobre instalaciones aprobadas con
    normativas anteriores, la aplicación del Reglamento se circunscribe
    exclusivamente a la parte de la instalación efectivamente modificada.
  source_doc: "NAG-200.pdf"
  source_section: "§1.2.2"
  notes: >
    Pregunta de continuidad que depende del contexto de Q-002 (alcance de NAG-200);
    el pronombre implícito «también» requiere que el modelo sepa que se habla de
    NAG-200. Prueba si el agente mantiene el hilo de la conversación.
  authored_by: "scaffold-reviewed"
  follow_up_of: "Q-002"
  expected_behavior: "answer"

- id: Q-016
  category: follow-up
  question_es: "¿Y cuál es la presión nominal de salida que deben garantizar esos reguladores?"
  reference_answer_es: >
    Según NAG-235 §1.2, la presión nominal de salida de esos reguladores
    domiciliarios debe ser de 0,019 bar (19 mbar) para gas natural (GN) y de
    0,028 bar (28 mbar) para gas licuado de petróleo (GLP).
  source_doc: "NAG-235.pdf"
  source_section: "§1.2"
  notes: >
    Pregunta de seguimiento de Q-004 (rango de presión de entrada de NAG-235);
    «esos reguladores» alude a los reguladores domiciliarios establecidos en Q-004.
    Prueba continuidad en preguntas sobre el mismo documento.
  authored_by: "scaffold-reviewed"
  follow_up_of: "Q-004"
  expected_behavior: "answer"

- id: Q-017
  category: follow-up
  question_es: "¿Y qué acción debe tomarse si durante esa prueba se detecta pasaje de gas?"
  reference_answer_es: >
    Según NAG-226 §5, la evidencia de pasaje de gas durante la prueba de
    hermeticidad constituye un «Defecto Principal», lo que obliga al corte
    inmediato del suministro de la instalación. Adicionalmente, cuando las
    características del medidor o de la instalación no permitan realizar la prueba
    a través del medidor, la Prestadora debe emplear otros métodos y dispositivos
    que posibiliten la verificación de la hermeticidad.
  source_doc: "NAG-226.pdf"
  source_section: "§5"
  notes: >
    Pregunta de seguimiento de Q-006 (prueba de hermeticidad NAG-226); «esa prueba»
    referencia la prueba de hermeticidad. Evalúa recuperación de la consecuencia
    normativa ante un resultado negativo en la prueba ya descripta.
  authored_by: "scaffold-reviewed"
  follow_up_of: "Q-006"
  expected_behavior: "answer"
