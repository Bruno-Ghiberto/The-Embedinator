# FACTOID — 10 pairs (Q-001 to Q-010)
# Single-article answers; test retrieval precision on explicit section references.
# ---------------------------------------------------------------------------

- id: Q-001
  category: factoid
  question_es: "¿Cuál es el objeto del Reglamento Técnico NAG-200?"
  reference_answer_es: >
    Según NAG-200 §1.1, el Reglamento Técnico NAG-200 establece los requisitos
    mínimos para el diseño, construcción, pruebas y habilitación de las
    instalaciones internas domiciliarias de gas natural (GN) o gas licuado de
    petróleo (GLP) distribuido por redes, así como sus condiciones mínimas de
    seguridad y conservación.
  source_doc: "NAG-200.pdf"
  source_section: "§1.1"
  notes: >
    Pregunta de alcance mínimo sobre el objeto de la norma principal del corpus;
    evalúa recuperación de la definición canónica del Reglamento.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-002
  category: factoid
  question_es: "¿A qué instalaciones se aplica obligatoriamente la norma NAG-200 en la República Argentina?"
  reference_answer_es: >
    Según NAG-200 §1.2.1, el Reglamento es de aplicación obligatoria en todo el
    territorio de la República Argentina para todas las instalaciones internas
    domiciliarias que operen a una presión que no supere los 28 mbar y que se
    abastezcan desde redes de distribución de GN o GLP que operen a baja o media
    presión.
  source_doc: "NAG-200.pdf"
  source_section: "§1.2"
  notes: >
    Pregunta de alcance y presión máxima de operación; establece el contexto
    para las preguntas de seguimiento Q-015.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-003
  category: factoid
  question_es: "¿Quién está habilitado para ejecutar, ampliar o reparar una instalación interna de gas domiciliaria según NAG-200?"
  reference_answer_es: >
    Según NAG-200 §1.3, toda instalación contemplada en el Reglamento Técnico
    sólo puede ser ejecutada, ampliada, reparada o modificada por un Instalador
    Matriculado.
  source_doc: "NAG-200.pdf"
  source_section: "§1.3"
  notes: >
    Pregunta sobre habilitación profesional; respuesta factual única y directa
    extraída del cuerpo normativo.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-004
  category: factoid
  question_es: "¿Cuál es el rango de presión de entrada para los reguladores de presión domiciliarios según NAG-235?"
  reference_answer_es: >
    Según NAG-235 §1.1, los reguladores deben estar diseñados para trabajar en un
    rango de presión de entrada de 0,5 bar a 4 bar para gas natural (GN), y de
    0,5 bar a 2 bar para gas licuado de petróleo (GLP).
  source_doc: "NAG-235.pdf"
  source_section: "§1.1"
  notes: >
    Pregunta numérica precisa sobre valores técnicos de NAG-235; establece el
    contexto para la pregunta de seguimiento Q-016.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-005
  category: factoid
  question_es: "¿Cuál es la presión nominal de salida que deben alcanzar los reguladores domiciliarios para gas natural y GLP según NAG-235?"
  reference_answer_es: >
    Según NAG-235 §1.2, la presión nominal de salida debe ser de 0,019 bar
    (19 mbar) para gas natural (GN), y de 0,028 bar (28 mbar) para gas licuado
    de petróleo (GLP).
  source_doc: "NAG-235.pdf"
  source_section: "§1.2"
  notes: >
    Pregunta numérica con distinción GN/GLP; prueba si el modelo puede recuperar
    valores específicos de una tabla de requisitos técnicos.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-006
  category: factoid
  question_es: "¿En qué consiste la prueba de hermeticidad de una instalación domiciliaria de gas según NAG-226?"
  reference_answer_es: >
    Según NAG-226 §5, la prueba de hermeticidad consiste en cerrar todas las
    válvulas de paso a los artefactos y verificar durante 15 minutos que el
    totalizador del medidor no registre pasaje de gas. Si se evidencia pasaje de
    gas, se clasifica como «Defecto Principal» y corresponde el corte inmediato
    del suministro.
  source_doc: "NAG-226.pdf"
  source_section: "§5"
  notes: >
    Pregunta de procedimiento; establece el contexto para la pregunta de
    seguimiento Q-017. Evalúa si el modelo recupera el detalle del tiempo
    (15 minutos) y la consecuencia (Defecto Principal).
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-007
  category: factoid
  question_es: "¿A qué tipo de dispositivos se aplica la norma NAG-204 y cuál es su objeto?"
  reference_answer_es: >
    Según NAG-204 §1, la norma se aplica al aparato eléctrico para la detección
    de monóxido de carbono en locales de uso doméstico. Su objeto es definir los
    requisitos generales de construcción, indicadores y alarmas, señales de fallo,
    etiquetado e instrucciones, y los métodos de ensayo y funcionamiento que deben
    cumplir estos dispositivos.
  source_doc: "NAG-204.pdf"
  source_section: "§1"
  notes: >
    Pregunta sobre objeto de norma de seguridad crítica (detectores de CO);
    evalúa identificación correcta del alcance dispositivo-norma.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-008
  category: factoid
  question_es: "¿Cuál es el objeto de la norma NAG-215 sobre las rejillas de ventilación permanente?"
  reference_answer_es: >
    Según NAG-215 §1, la norma establece las características que deben cumplir las
    rejillas de ventilación permanentes, definiendo criterios de aceptación,
    requisitos mínimos y métodos de ensayo, con el fin de garantizar la seguridad
    en su empleo en instalaciones de gas domiciliarias, comerciales e industriales.
  source_doc: "NAG-215.pdf"
  source_section: "§1"
  notes: >
    Pregunta sobre objeto de norma de componente específico; evalúa recuperación
    de definición en un documento corto del corpus.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-009
  category: factoid
  question_es: "¿Cuál es el objeto de la norma NAG-214 respecto a los elementos sellantes de roscas para cañerías domiciliarias?"
  reference_answer_es: >
    Según NAG-214 §2, la norma tiene por objeto definir las características de
    resistencia, sellabilidad, procedimientos de ensayo y marcado que deben reunir
    los elementos sellantes de roscas, fraguantes o no fraguantes, utilizados en
    cañerías domiciliarias conductoras de gas a baja presión.
  source_doc: "NAG-214.pdf"
  source_section: "§2"
  notes: >
    Pregunta sobre objeto de norma de materiales auxiliares; el modelo debe
    distinguir entre elementos fraguantes y no fraguantes como detalle clave.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-010
  category: factoid
  question_es: "¿A qué tipo de reparaciones se aplica la norma NAG-203 y en qué régimen fue aprobada?"
  reference_answer_es: >
    Según NAG-203 §1 y §2, la norma se aplica a la reparación de pérdidas en
    uniones roscadas de instalaciones domiciliarias de gas mediante resina sellante.
    Fue aprobada en período de introducción controlada, lo que implica condiciones
    específicas de supervisión y documentación por parte del aplicador y del
    organismo de control (OC) establecidas en el texto normativo.
  source_doc: "NAG-203.pdf"
  source_section: "§1"
  notes: >
    Pregunta sobre alcance de norma reciente (2024) que formaliza una práctica de
    reparación antes no regulada; el detalle «introducción controlada» es clave.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

