# ANALYTICAL — 4 pairs (Q-011 to Q-014)
# Require razonamiento a través de múltiples pasajes o documentos cruzados.
# Hipótesis H3 (citation cross-reference grounding) — evalúa si el modelo
# puede articular relaciones explícitas entre normas del mismo corpus.
# ---------------------------------------------------------------------------

- id: Q-011
  category: analytical
  question_es: "¿Cómo se articulan los requisitos de presión de NAG-235 con el diseño de la cañería interna definido en NAG-200?"
  reference_answer_es: >
    NAG-200 §1.2.1 establece que la instalación interna debe operar a una presión
    máxima de 28 mbar. Esta cifra es coherente con la presión nominal de salida
    para GLP fijada en NAG-235 §1.2 (28 mbar) y con la de GN (19 mbar).
    NAG-200 §1.6 cita explícitamente a NAG-235 como norma de referencia obligatoria.
    El regulador domiciliario normalizado por NAG-235 garantiza que la instalación
    interna —dimensionada según los procedimientos de cálculo de NAG-200 §4.6—
    opere siempre dentro del rango de presión de trabajo para el que fue calculada,
    conectando el régimen de media presión de la red de distribución con los
    artefactos de baja presión.
  source_doc: "NAG-235.pdf,NAG-200.pdf"
  source_section: "§1.1, §1.2, §1.2.1, §1.6, §4.6"
  notes: >
    Pregunta de razonamiento cruzado H3; el modelo debe citar tanto NAG-235 como
    NAG-200 y articular la relación de presión entre ambas normas.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-012
  category: analytical
  question_es: "¿Cómo complementa el procedimiento de revisión técnica de NAG-226 a los requisitos de instalación definidos en NAG-200?"
  reference_answer_es: >
    NAG-200 establece los requisitos mínimos para la ejecución de nuevas
    instalaciones y modificaciones. NAG-226, por su parte, define el procedimiento
    de verificación periódica de instalaciones existentes, evaluando si mantienen
    las condiciones de seguridad originalmente exigidas. NAG-226 §4 indica
    explícitamente que la normalización de las irregularidades detectadas durante
    la revisión técnica debe realizarse conforme a NAG-200 última edición. De este
    modo, NAG-200 opera como estándar de construcción y NAG-226 como estándar de
    control y rehabilitación en servicio, articulados en una cadena de seguridad
    continua que cubre el ciclo completo de vida de la instalación domiciliaria.
  source_doc: "NAG-226.pdf,NAG-200.pdf"
  source_section: "§4, §5"
  notes: >
    Pregunta que requiere identificar la relación explícita NAG-226 §4 → NAG-200
    como referencia correctiva; prueba capacidad de razonamiento ciclo de vida.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-013
  category: analytical
  question_es: "¿De qué manera integra NAG-200 los requisitos de los elementos sellantes de roscas definidos en NAG-214?"
  reference_answer_es: >
    NAG-200 §1.6 incluye a NAG-214 como norma de referencia obligatoria. En la
    sección de prolongaciones internas, NAG-200 establece que las piezas sujetas
    a movimiento deben conectarse con pasta aprobada según NAG-214 o cinta de
    politetrafluoretileno (Teflón). Adicionalmente, NAG-200 §4.3 especifica que
    los elementos sellantes de roscas utilizados en la cañería interna deben ser
    aprobados conforme a NAG-214. Así, NAG-214 provee las especificaciones de
    producto (resistencia, sellabilidad, ensayos y marcado), mientras que NAG-200
    prescribe cuándo y dónde utilizarlos dentro de la instalación.
  source_doc: "NAG-214.pdf,NAG-200.pdf"
  source_section: "§1.6, §4.3"
  notes: >
    Pregunta cruzada H3 sobre integración normativa materiales-instalación; el
    modelo debe citar correctamente §1.6 y §4.3 de NAG-200, además de NAG-214 §2.
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

- id: Q-014
  category: analytical
  question_es: "¿Cómo se relacionan los requisitos de los detectores de monóxido de carbono de NAG-204 con el procedimiento de revisión técnica de NAG-226?"
  reference_answer_es: >
    NAG-226 §8 incorpora la detección de monóxido de carbono en ambiente como
    verificación obligatoria de la revisión técnica, clasificando los resultados
    en correcto, defecto principal o defecto secundario según los niveles
    detectados. Los dispositivos de detección utilizados deben cumplir con los
    requisitos constructivos, funcionales y de ensayo establecidos en NAG-204.
    De esta forma, NAG-204 define el instrumento de medición (su construcción,
    alarmas, señales de fallo y métodos de ensayo) y NAG-226 prescribe su uso y
    los criterios de aceptación durante el control periódico de instalaciones
    existentes, conformando una cadena normativa integrada de seguridad por CO.
  source_doc: "NAG-204.pdf,NAG-226.pdf"
  source_section: "§8, §1"
  notes: >
    Pregunta cruzada H3 sobre seguridad por CO; el modelo debe articular NAG-204
    (instrumento) con NAG-226 §8 (procedimiento de aplicación).
  authored_by: "scaffold-reviewed"
  follow_up_of: null
  expected_behavior: "answer"

