# Development overrides — hot reload, verbose logging, bind mounts
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./backend:/app/backend
      - ./data:/data:z
    environment:
      LOG_LEVEL: DEBUG
      DEBUG: "true"
      CHECKPOINT_AUTO_RECOVER: "true"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend

  frontend:
    build:
      context: ./frontend
      target: deps
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/hooks:/app/hooks
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - /app/node_modules
      - /app/.next
    environment:
      - BACKEND_URL=http://backend:8000
    command: npx next dev --hostname 0.0.0.0
