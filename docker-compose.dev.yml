# Development overrides — hot reload, verbose logging, bind mounts
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      - LOG_LEVEL=DEBUG
      - DEBUG=true
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend/src:/app/src
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: npm run dev
