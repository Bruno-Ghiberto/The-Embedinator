# Build and release CLI binaries via GoReleaser for The Embedinator.
# Purpose:  Publish CLI binaries and Homebrew tap ONLY when CI passes on
#           the tagged commit — prevents broken CLI releases from shipping.
# Triggers: push of a CLI semver tag (cli/v*).
# Blockers: The 'ci' job must complete with all_passed == 'true' before
#           goreleaser runs.  A failed CI run produces no binaries or tap update.
# Future:   A6 (Wave 3) adds SBOM generation via goreleaser checksums config.

name: Release CLI

on:
  push:
    tags:
      - "cli/v*"

permissions:
  contents: write
  packages: write

jobs:

  # ---------------------------------------------------------------------------
  # Gate: run the full CI suite on this exact tagged commit
  # ---------------------------------------------------------------------------

  ci:
    # Reusable-workflow caller — NO timeout-minutes/runs-on/steps/`permissions: inherit`.
    # Explicit permissions mirror _ci-core.yml's internal declaration.
    uses: ./.github/workflows/_ci-core.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write

  # ---------------------------------------------------------------------------
  # Release — only runs when CI passes
  # ---------------------------------------------------------------------------

  release:
    name: Build and release CLI
    needs: ci
    if: needs.ci.outputs.all_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Run tests
        working-directory: cli
        run: go test ./...

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          version: "~> v2"
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
