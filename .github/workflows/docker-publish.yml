# Build and push backend + frontend Docker images to ghcr.io.
# Purpose:  Publish container images ONLY when CI passes on the exact
#           triggering commit SHA — no race window possible.
# Triggers: push to main (tagged 'latest'), semver tags (v*).
# Blockers: The 'ci' job must complete with all_passed == 'true' before
#           any image is pushed.  A failed CI run short-circuits both
#           build-backend and build-frontend.
# Future:   A6 (Wave 3) adds trivy scan, cosign keyless signing, and
#           syft SBOM attestation after the 'ci' gate.

name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/embedinator-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/embedinator-frontend

jobs:

  # ---------------------------------------------------------------------------
  # Gate: run the full CI suite on this exact commit before pushing anything
  # ---------------------------------------------------------------------------

  ci:
    # Reusable-workflow caller — NO timeout-minutes/runs-on/steps/`permissions: inherit`.
    # Explicit permissions mirror _ci-core.yml's internal declaration.
    uses: ./.github/workflows/_ci-core.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write

  # ---------------------------------------------------------------------------
  # Publish jobs — only execute when CI passes
  # ---------------------------------------------------------------------------

  build-backend:
    needs: ci
    if: needs.ci.outputs.all_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ----- FR-009: Trivy image scan (fails on HIGH/CRITICAL fixable CVEs) -----
      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}@${{ steps.build-backend.outputs.digest }}
          severity: 'HIGH,CRITICAL'
          exit-code: 1
          ignore-unfixed: true
          format: table

  build-frontend:
    needs: ci
    if: needs.ci.outputs.all_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BACKEND_URL=http://backend:8000

      # ----- FR-009: Trivy image scan (fails on HIGH/CRITICAL fixable CVEs) -----
      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}@${{ steps.build-frontend.outputs.digest }}
          severity: 'HIGH,CRITICAL'
          exit-code: 1
          ignore-unfixed: true
          format: table
