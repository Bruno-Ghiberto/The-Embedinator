# Build and push backend + frontend Docker images to ghcr.io.
# Purpose:  Publish container images ONLY when CI passes on the exact
#           triggering commit SHA — no race window possible.
# Triggers: push to main (tagged 'latest'), semver tags (v*).
# Blockers: The 'ci' job must complete with all_passed == 'true' before
#           any image is pushed.  A failed CI run short-circuits both
#           build-backend and build-frontend.
# Future:   A6 (Wave 3) adds trivy scan, cosign keyless signing, and
#           syft SBOM attestation after the 'ci' gate.

name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/embedinator-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/embedinator-frontend

jobs:

  # ---------------------------------------------------------------------------
  # Gate: run the full CI suite on this exact commit before pushing anything
  # ---------------------------------------------------------------------------

  ci:
    uses: ./.github/workflows/_ci-core.yml
    permissions: inherit

  # ---------------------------------------------------------------------------
  # Publish jobs — only execute when CI passes
  # ---------------------------------------------------------------------------

  build-backend:
    needs: ci
    if: needs.ci.outputs.all_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-frontend:
    needs: ci
    if: needs.ci.outputs.all_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BACKEND_URL=http://backend:8000
