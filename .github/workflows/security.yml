# Static analysis security scanning via GitHub CodeQL.
# Purpose:  Run CodeQL's semantic analysis across Python and JavaScript/
#           TypeScript sources to surface injection, hardcoded-secret, and
#           unsafe-deserialization findings before they reach main.
# Triggers: push to main; weekly schedule (Mondays 06:00 UTC) to catch newly
#           published rules against unchanged code.
# Blockers: Runs post-push; does NOT gate merges by default (ADVISORY).  A6
#           extends the language matrix to Go in Wave 3 and may flip role to
#           REQUIRED for security-events findings.
# Role:     ADVISORY (informational) — surfaces findings in the Security tab.

name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    # 30 min covers CodeQL build + analysis; A6 extends matrix to Go in Wave 3.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          category: "/language:${{ matrix.language }}"
