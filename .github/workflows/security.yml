# Static analysis security scanning via GitHub CodeQL.
# Purpose:  Run CodeQL's semantic analysis across Python, JavaScript/
#           TypeScript, and Go sources to surface injection, hardcoded-secret,
#           and unsafe-deserialization findings before they reach main.
# Triggers: push to main; weekly schedule (Mondays 06:00 UTC) to catch newly
#           published rules against unchanged code.
# Blockers: Runs post-push; does NOT gate merges by default (ADVISORY).
#           May flip role to REQUIRED for security-events findings in a
#           follow-up spec once the tooling matures.
# Role:     ADVISORY (informational) — surfaces findings in the Security tab.

name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    # 30 min covers CodeQL build + analysis across python, javascript-typescript, and go.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Rust covered by cargo audit + clippy -D warnings in ci-rust.yml;
        # CodeQL does not natively support Rust (FR-011).
        language: [python, javascript-typescript, go]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: "/language:${{ matrix.language }}"
