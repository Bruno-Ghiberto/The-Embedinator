# Thin CI dispatcher for The Embedinator.
# Purpose:  Triggers _ci-core.yml on every PR (any base branch) and every push to main.
#           All job logic lives in _ci-core.yml; this file is intentionally
#           minimal so contributors can trace the full gate from one place.
# Triggers: pull_request (all base branches — supports feature→develop→main flow
#           AND long-lived feature/spec branches like this one), push to main.
# Blockers: None — this is the trigger, not the gate.  Publish workflows
#           (docker-publish, release, release-cli) are the gated consumers.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Reusable-workflow caller jobs CANNOT declare timeout-minutes / runs-on /
    # steps — those fields are only valid on runner jobs. Inner jobs inside
    # _ci-core.yml have their own per-job timeouts (the reason the original
    # caller-side timeout was attempted). Keep this block minimal.
    uses: ./.github/workflows/_ci-core.yml
    permissions: inherit
